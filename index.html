<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Predictions — Quick Sites</title>
  <script src="/client/quick.js"></script>
  <style>
    :root {
      --bg: #f8f9fb; --card: #fff; --border: #e3e5e8; --text: #1a1a1a;
      --muted: #6b7280; --accent: #2563eb; --accent-light: #eff6ff;
      --purple: #7c3aed; --purple-light: #f5f3ff;
      --green: #16a34a; --green-light: #f0fdf4;
      --amber: #d97706; --amber-light: #fffbeb;
      --rose: #e11d48; --rose-light: #fff1f2;
      --cyan: #0891b2; --cyan-light: #ecfeff;
      --danger: #dc2626;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }

    /* Header */
    .header { background:var(--card); border-bottom:1px solid var(--border); padding:20px 0; position:sticky; top:0; z-index:100; }
    .header-inner { max-width:1200px; margin:0 auto; padding:0 24px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
    .header-left { display:flex; align-items:center; gap:12px; }
    .header h1 { font-size:18px; font-weight:700; }
    .header-links { display:flex; gap:12px; font-size:12px; }
    .header-links a { color:var(--muted); text-decoration:none; }
    .header-links a:hover { color:var(--accent); }
    .header-actions { display:flex; gap:8px; align-items:center; }
    .user-info { font-size:13px; color:var(--muted); display:flex; align-items:center; gap:6px; }
    .user-info img { width:24px; height:24px; border-radius:50%; }

    .container { max-width:1200px; margin:0 auto; padding:24px; }

    /* Stats bar */
    .stats-bar { display:flex; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
    .stat { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 18px; display:flex; flex-direction:column; }
    .stat-value { font-size:22px; font-weight:700; color:var(--accent); }
    .stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }

    /* Controls */
    .controls { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
    .search-box { flex:1; min-width:200px; padding:9px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; outline:none; }
    .search-box:focus { border-color:var(--accent); }
    select.filter-select { padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; background:var(--card); cursor:pointer; outline:none; }

    /* Category pills */
    .pill-row { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
    .pill { padding:5px 14px; border:1px solid var(--border); border-radius:20px; background:var(--card); font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; white-space:nowrap; display:flex; align-items:center; gap:4px; }
    .pill:hover { border-color:var(--accent); color:var(--accent); }
    .pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .pill .pill-count { font-size:10px; opacity:.7; }

    /* Card grid */
    .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; transition:box-shadow .15s,border-color .15s; position:relative; display:flex; flex-direction:column; }
    .card:hover { box-shadow:0 4px 12px rgba(0,0,0,.06); border-color:#ccc; }
    .card.is-favourited { border-left:3px solid #f59e0b; }
    .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
    .card-title { font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px; flex:1; }
    .card-title a { color:var(--accent); text-decoration:none; }
    .card-title a:hover { text-decoration:underline; }
    .card-desc { font-size:12px; color:var(--muted); margin-bottom:10px; flex:1; line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .card-footer { display:flex; flex-wrap:wrap; gap:6px; align-items:center; font-size:11px; color:var(--muted); margin-top:auto; }
    .card-footer a { color:var(--muted); text-decoration:none; font-size:11px; }
    .card-footer a:hover { color:var(--accent); text-decoration:underline; }
    .badge { padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; display:inline-flex; align-items:center; gap:3px; }
    .badge.cat-analytics { background:var(--accent-light); color:var(--accent); }
    .badge.cat-configuration { background:var(--green-light); color:var(--green); }
    .badge.cat-observability { background:var(--amber-light); color:var(--amber); }
    .badge.cat-productivity { background:var(--purple-light); color:var(--purple); }
    .badge.cat-development { background:var(--rose-light); color:var(--rose); }
    .badge.team-badge { background:#f1f5f9; color:#475569; }
    .badge.source-auto { background:var(--cyan-light); color:var(--cyan); }
    .badge.source-manual { background:#f1f5f9; color:#64748b; }

    /* Fav */
    .fav-btn { background:none; border:none; cursor:pointer; font-size:16px; padding:0; filter:grayscale(1) opacity(.3); transition:all .15s; }
    .fav-btn:hover { transform:scale(1.15); filter:grayscale(0) opacity(.7); }
    .fav-btn.is-fav { filter:none; }

    /* Card hover actions */
    .card-actions { display:flex; gap:3px; opacity:0; transition:opacity .15s; }
    .card:hover .card-actions { opacity:1; }
    .action-btn { width:24px; height:24px; border:1px solid var(--border); border-radius:5px; background:var(--card); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; }
    .action-btn:hover { background:var(--bg); }
    .action-btn.del:hover { background:#fef2f2; border-color:var(--danger); }

    /* Buttons */
    .btn-primary { padding:9px 16px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; }
    .btn-primary:hover { background:#1d4ed8; }
    .btn-secondary { padding:7px 12px; background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px; font-size:12px; cursor:pointer; }
    .btn-secondary:hover { background:var(--bg); }

    /* Pagination */
    .pagination { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:16px; flex-wrap:wrap; }
    .pg-btn { padding:5px 10px; border:1px solid var(--border); border-radius:6px; background:var(--card); font-size:12px; cursor:pointer; }
    .pg-btn:hover { border-color:var(--accent); color:var(--accent); }
    .pg-btn.active-pg { background:var(--accent); color:#fff; border-color:var(--accent); }
    .pg-btn:disabled { opacity:.4; cursor:default; }
    .pg-info { font-size:11px; color:var(--muted); }
    .pg-size { padding:4px 8px; border:1px solid var(--border); border-radius:6px; font-size:11px; background:var(--card); cursor:pointer; }

    /* Section collapse */
    .section { margin-bottom:28px; }
    .section-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; padding-bottom:6px; border-bottom:2px solid var(--border); cursor:pointer; user-select:none; }
    .section-header:hover { opacity:.8; }
    .section-header h2 { font-size:15px; font-weight:600; }
    .section-count { font-size:12px; color:var(--muted); margin-left:auto; }
    .chevron { font-size:12px; color:var(--muted); transition:transform .2s; }
    .chevron.collapsed { transform:rotate(-90deg); }
    .section-body.hidden { display:none; }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; justify-content:center; align-items:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--card); border-radius:16px; padding:24px; width:500px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.15); }
    .modal h2 { font-size:17px; font-weight:600; margin-bottom:16px; }
    .fg { margin-bottom:14px; }
    .fg label { display:block; font-size:12px; font-weight:500; margin-bottom:3px; }
    .fg .hint { font-size:11px; color:var(--muted); margin-bottom:3px; }
    .fg input, .fg textarea, .fg select { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px; outline:none; font-family:inherit; }
    .fg input:focus, .fg textarea:focus, .fg select:focus { border-color:var(--accent); }
    .fg textarea { resize:vertical; min-height:50px; }
    .form-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }

    .empty-state { text-align:center; padding:40px; color:var(--muted); }
    .empty-state p { font-size:13px; margin-top:6px; }
    .loading { text-align:center; padding:40px; color:var(--muted); font-size:13px; }
    .auto-banner { background:var(--cyan-light); border:1px solid #a5f3fc; border-radius:10px; padding:12px 16px; margin-bottom:20px; font-size:12px; color:var(--cyan); display:flex; align-items:center; gap:8px; }

    @media(max-width:640px) { .card-grid{grid-template-columns:1fr;} .controls{flex-direction:column;} .search-box{min-width:100%;} .stats-bar{flex-direction:column;} }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <h1>🧭 Delivery Predictions — Quick Sites</h1>
      <div class="header-links">
        <a href="https://github.com/SagarSidhu/delivery-predictions-directory" target="_blank">📂 GitHub</a>
        <a href="https://vault.shopify.io/teams/2836-Delivery-Predictions" target="_blank">👥 Vault Team</a>
        <a href="https://directory.quick.shopify.io/" target="_blank">🌐 All Quick Sites</a>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-secondary" onclick="syncFromDirectory()" id="syncBtn">🔄 Sync from Directory</button>
      <div class="user-info" id="userInfo"></div>
      <button class="btn-primary" onclick="openModal()">+ Add</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="auto-banner" id="autoBanner" style="display:none;">
    🤖 <strong id="autoCount">0</strong> sites auto-discovered from <a href="https://directory.quick.shopify.io/" target="_blank" style="color:var(--cyan);">directory.quick.shopify.io</a> by matching team member emails. <span id="lastSync" style="margin-left:auto;font-size:11px;"></span>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="controls">
    <input type="text" class="search-box" id="searchInput" placeholder="Search by name, description, owner, or URL…">
    <select class="filter-select" id="catFilter">
      <option value="">All types</option>
      <option value="analytics">📊 Analytics</option>
      <option value="configuration">⚙️ Configuration</option>
      <option value="observability">📡 Observability</option>
      <option value="productivity">📝 Productivity</option>
      <option value="development">🛠 Development</option>
    </select>
    <select class="filter-select" id="teamFilter">
      <option value="">All teams</option>
      <option value="platform">Platform</option>
      <option value="experience">Experience</option>
      <option value="data">Data</option>
      <option value="design">Design</option>
      <option value="product-management">Product Management</option>
    </select>
    <select class="filter-select" id="ownerFilter"><option value="">All owners</option></select>
    <select class="filter-select" id="sortSelect">
      <option value="newest">Newest</option>
      <option value="alpha">A→Z</option>
      <option value="alpha-desc">Z→A</option>
    </select>
  </div>

  <div class="pill-row" id="pillRow"></div>

  <div id="content"><div class="loading">Loading…</div></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">Add a Tool</h2>
    <form id="toolForm" onsubmit="saveTool(event)">
      <input type="hidden" id="editId" value="">
      <div class="fg"><label>Name *</label><input type="text" id="fName" required placeholder="My Awesome Tool"></div>
      <div class="fg"><label>URL *</label><input type="url" id="fUrl" required placeholder="https://my-tool.quick.shopify.io"></div>
      <div class="fg"><label>Description *</label><textarea id="fDesc" required placeholder="What does this tool do?"></textarea></div>
      <div class="fg"><label>GitHub Repo</label><input type="url" id="fGithub" placeholder="https://github.com/..."></div>
      <div class="fg"><label>Type *</label>
        <select id="fCat" required>
          <option value="analytics">📊 Analytics</option>
          <option value="configuration">⚙️ Configuration</option>
          <option value="observability">📡 Observability</option>
          <option value="productivity">📝 Productivity</option>
          <option value="development">🛠 Development</option>
        </select>
      </div>
      <div class="fg"><label>Team</label>
        <select id="fTeam">
          <option value="">(none)</option>
          <option value="platform">Platform</option>
          <option value="experience">Experience</option>
          <option value="data">Data</option>
          <option value="design">Design</option>
          <option value="product-management">Product Management</option>
        </select>
      </div>
      <div class="fg"><label>Created By *</label><input type="text" id="fOwner" required placeholder="Your name"></div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-primary" id="submitBtn">Add</button>
      </div>
    </form>
  </div>
</div>

<script>
const db = quick.db.collection("tools");
let all = [], currentUser = null;
let activeCat = "", activeTeam = "", activePill = "";
const ADMIN_EMAILS = ["sagar.sidhu@shopify.com"];
const PER_PAGE = 9;
const pages = { team: 1, shared: 1 };
const collapsed = { team: localStorage.getItem("col-team")==="true", shared: localStorage.getItem("col-shared")==="true" };
let favs = new Set(JSON.parse(localStorage.getItem("tool-favs") || "[]"));
let sort = "newest";

// Team member emails for auto-sync matching
const TEAM_EMAILS = [
  // Delivery Predictions (parent)
  "janson.webster@shopify.com","jacques.krzepkowski@shopify.com","shwetha.shyam@shopify.com",
  "durmus.karatay@shopify.com","ryan.creps@shopify.com","sandeep.sikka@shopify.com",
  // Platform
  "atul.sharma@shopify.com","elijah.adeyale@shopify.com","jesse.li@shopify.com",
  "jingxian.hou@shopify.com","joseph.carino@shopify.com","lovejesh.bangar@shopify.com",
  "mario.muniz@shopify.com","peter.moon@shopify.com","ryan.wang@shopify.com",
  "sagar.sidhu@shopify.com","trey.wilson@shopify.com",
  // Experience
  "charlie.morris@shopify.com","abraham.tabo@shopify.com","alexa.whitney@shopify.com",
  "amanda.billingsley@shopify.com","andrew.johnson@shopify.com","christoflurp.sweeney@shopify.com",
  "gourave.verma@shopify.com","josh.murray@shopify.com","mori.ahmadi@shopify.com",
  "pedro.durek@shopify.com","ryan.aldred@shopify.com","sergio.garcia@shopify.com",
  "sheri.soliman@shopify.com","umar.ahmed@shopify.com",
  // Data (leads)
  "siraj.ali@shopify.com"
];

const CAT = {
  analytics:     { icon:"📊", label:"Analytics" },
  configuration: { icon:"⚙️", label:"Configuration" },
  observability: { icon:"📡", label:"Observability" },
  productivity:  { icon:"📝", label:"Productivity" },
  development:   { icon:"🛠", label:"Development" }
};
const TEAMS = { platform:"Platform", experience:"Experience", data:"Data", design:"Design", "product-management":"Product Management" };

function isAdmin() { return currentUser && ADMIN_EMAILS.includes(currentUser.email); }
function saveFavs() { localStorage.setItem("tool-favs", JSON.stringify([...favs])); }
function toggleFav(id) { favs.has(id) ? favs.delete(id) : favs.add(id); saveFavs(); render(); }
function toggleCollapse(t) { collapsed[t]=!collapsed[t]; localStorage.setItem("col-"+t,collapsed[t]); render(); }
function setPage(t,p) { pages[t]=p; render(); }

function sortItems(items) {
  return [...items].sort((a,b) => {
    if (sort==="newest") return (b.created_at||"").localeCompare(a.created_at||"");
    if (sort==="alpha") return a.name.localeCompare(b.name);
    return b.name.localeCompare(a.name);
  });
}

// Auto-sync: fetch directory.json and filter by team emails
async function syncFromDirectory() {
  const btn = document.getElementById("syncBtn");
  btn.textContent = "⏳ Syncing…"; btn.disabled = true;
  try {
    const res = await fetch("https://directory.quick.shopify.io/directory.json");
    const sites = await res.json();
    const existing = await db.find();
    const existingUrls = new Set(existing.map(t => t.url));
    let added = 0;
    for (const site of sites) {
      const email = (site.modified_by || site.author || "").toLowerCase();
      if (!TEAM_EMAILS.includes(email)) continue;
      const url = `https://${site.subdomain}.quick.shopify.io/`;
      if (existingUrls.has(url)) continue;
      // Skip PR previews and staging
      if (site.subdomain.match(/-(pr\d+|stg|staging|test|dev)$/i)) continue;
      const name = (site.title || site.subdomain).replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase());
      await db.create({
        name, url,
        description: site.description || "",
        github: "", tool_cat: "development", team_tag: "",
        created_by: site.modified_by_name || site.modified_by || email,
        source: "auto"
      });
      added++;
    }
    localStorage.setItem("last-sync", new Date().toISOString());
    btn.textContent = added > 0 ? `✅ Added ${added}` : "✅ Up to date";
    await loadTools();
  } catch(e) {
    console.error("Sync failed:", e);
    btn.textContent = "❌ Sync failed (need to be on the site directly)";
  }
  setTimeout(() => { btn.textContent = "🔄 Sync from Directory"; btn.disabled = false; }, 3000);
}

// Seed data
const SEED = [
  { name:"Magellan Config V2 Editor", url:"https://delivery-prediction-config-editor.quick.shopify.io/", description:"Visualize, validate, diff, and create PRs for Magellan prediction configs.", github:"https://github.com/shopify-playground/magellan-config-v2-editor", tool_cat:"configuration", team_tag:"platform", created_by:"Elijah Adeyale", source:"manual" },
  { name:"Predictions Search Utility", url:"https://delivery-prediction-search-utility.lit.shopify.io/", description:"3D globe visualizer, per-country accuracy breakdowns, BigQuery query builder, DHM observability.", github:"https://github.com/Shopify/streamlit-service", tool_cat:"analytics", team_tag:"platform", created_by:"Elijah Adeyale", source:"manual" },
  { name:"V2 Prediction Rollout Dashboard", url:"https://observe.shopify.io/d/promise-global-predictions-rollout/promise-global-predictions-and-v2-config-rollout", description:"Core + SFR rollout metrics, shadow vs. live V1/V2 comparison.", github:"https://github.com/shopify-playground/v2-prediction-rollout-dashboard", tool_cat:"observability", team_tag:"platform", created_by:"Mario Muniz", source:"manual" },
  { name:"Magellan Config Comparison", url:"https://magellan-config-comparison.quick.shopify.io/", description:"Interactive V1/V2 config comparison with voting, route testing, and AI assistant.", github:"", tool_cat:"configuration", team_tag:"platform", created_by:"Sagar Sidhu", source:"manual" },
  { name:"Delivery Predictions Funnel", url:"https://delivery-predictions-funnel.quick.shopify.io/", description:"Prediction funnel analysis — volume, conversion, and coverage.", github:"https://github.com/shopify-playground/st-data-science", tool_cat:"analytics", team_tag:"data", created_by:"Siraj Ali", source:"manual" },
  { name:"Barriers to Delivery Predictions", url:"https://barriers-delivery-predictions.quick.shopify.io/", description:"Barriers preventing predictions by country (4% US, 16% EU).", github:"", tool_cat:"analytics", team_tag:"product-management", created_by:"Shwetha Shyam", source:"manual" },
  { name:"DHM Metrics — Performance & Accuracy", url:"https://dhm-metrics.quick.shopify.io/", description:"Prediction performance and accuracy. Queries monorail model_request.", github:"", tool_cat:"analytics", team_tag:"data", created_by:"Amanda Billingsley", source:"manual" },
  { name:"DHM Drift Monitoring", url:"https://dhm-drift-monitoring.quick.shopify.io/", description:"Data drift monitoring for delivery prediction features.", github:"", tool_cat:"observability", team_tag:"data", created_by:"Amanda Billingsley", source:"manual" },
  { name:"Drift Detection Runs", url:"https://delivery-date-drift-detection-stg.quick.shopify.io/", description:"Drift detection run results from model_request features.", github:"", tool_cat:"observability", team_tag:"data", created_by:"Amanda Billingsley", source:"manual" },
  { name:"Bug Hunt", url:"https://bughunt.quick.shopify.io/", description:"Create bug hunt YAML files. Companion skill at skills.quick.shopify.io.", github:"", tool_cat:"development", team_tag:"experience", created_by:"Mori Ahmadi", source:"manual" },
  { name:"Write", url:"https://write.quick.shopify.io/", description:"Markdown docs with Slack comment notifications.", github:"", tool_cat:"productivity", team_tag:"", created_by:"Quick Team", source:"manual" },
  { name:"Markdown Comments", url:"https://markdown-comments.quick.shopify.io/", description:"Markdown with inline commenting for plans and reviews.", github:"", tool_cat:"productivity", team_tag:"", created_by:"Quick Team", source:"manual" },
  { name:"Skills Catalog", url:"https://skills.quick.shopify.io/", description:"Browse and discover Quick skills (bughunt, gsd-proposal, etc.).", github:"", tool_cat:"development", team_tag:"", created_by:"Quick Team", source:"manual" },
  { name:"Impact Review Copilot", url:"https://impact-review-copilot.quick.shopify.io/", description:"Scans Slack/GitHub/Vault to generate contribution reports for mastery reviews.", github:"", tool_cat:"productivity", team_tag:"", created_by:"Quick Team", source:"manual" },
  { name:"Chronicle", url:"https://chronicle.quick.shopify.io/", description:"Summarizes your GitHub contributions for impact reviews.", github:"", tool_cat:"productivity", team_tag:"", created_by:"Quick Team", source:"manual" },
  { name:"Weekly Recap", url:"https://weekly-recap.quick.shopify.io/", description:"Weekly recaps and reminders for standup prep.", github:"", tool_cat:"productivity", team_tag:"", created_by:"Quick Team", source:"manual" },
  { name:"Skill Decoder", url:"https://skill-decoder.quick.shopify.io/", description:"Transforms AI skill files into structured human-readable playbooks.", github:"", tool_cat:"development", team_tag:"", created_by:"Anderson Ferreira", source:"manual" },
];

async function init() {
  try {
    const u = await quick.id.waitForUser();
    currentUser = u;
    document.getElementById("userInfo").innerHTML = u.slackImageUrl ? `<img src="${u.slackImageUrl}"> ${u.firstName}` : u.firstName||u.email;
    document.getElementById("fOwner").value = u.fullName || "";
  } catch(e) {}
  await seed();
  await loadTools();
  setupListeners();
  saveFavs();
  showSyncBanner();
}

async function seed() {
  const existing = await db.find();
  const urls = new Set(existing.map(t=>t.url));
  let n=0;
  for (const s of SEED) { if (!urls.has(s.url)) { await db.create(s); n++; } }
  if (n) console.log(`Seeded ${n}`);
}

async function loadTools() {
  all = await db.find();
  buildOwners();
  buildPills();
  renderStats();
  render();
}

function showSyncBanner() {
  const autoCount = all.filter(t=>t.source==="auto").length;
  if (autoCount > 0) {
    document.getElementById("autoBanner").style.display = "flex";
    document.getElementById("autoCount").textContent = autoCount;
    const ls = localStorage.getItem("last-sync");
    if (ls) document.getElementById("lastSync").textContent = `Last sync: ${new Date(ls).toLocaleDateString()}`;
  }
}

function buildOwners() {
  const owners = [...new Set(all.map(t=>t.created_by))].sort();
  const sel = document.getElementById("ownerFilter");
  const cur = sel.value;
  sel.innerHTML = '<option value="">All owners</option>';
  owners.forEach(o => { const op=document.createElement("option"); op.value=o; op.textContent=o; sel.appendChild(op); });
  sel.value = cur;
}

function buildPills() {
  const counts = {};
  all.forEach(t => { const c=t.tool_cat||""; if (c) counts[c]=(counts[c]||0)+1; });
  const row = document.getElementById("pillRow");
  row.innerHTML = '<span class="pill '+(activePill===""?"active":"")+'" onclick="setPill(\'\')">All</span>' +
    Object.entries(CAT).map(([k,v]) => {
      const cnt = counts[k]||0;
      return `<span class="pill ${activePill===k?"active":""}" onclick="setPill('${k}')">${v.icon} ${v.label} <span class="pill-count">${cnt}</span></span>`;
    }).join("") +
    `<span class="pill ${activePill==="favourites"?"active":""}" onclick="setPill('favourites')" ${favs.size===0?'style="display:none"':''} id="favPill">⭐ Favourites <span class="pill-count">${favs.size}</span></span>`;
}

function setPill(p) { activePill = activePill===p ? "" : p; pages.team=1; pages.shared=1; buildPills(); render(); }

function renderStats() {
  const teamCount = all.filter(t=>isTeamTool(t)).length;
  const sharedCount = all.filter(t=>!isTeamTool(t)).length;
  const autoCount = all.filter(t=>t.source==="auto").length;
  document.getElementById("statsBar").innerHTML = `
    <div class="stat"><span class="stat-value">${all.length}</span><span class="stat-label">Total Sites</span></div>
    <div class="stat"><span class="stat-value">${teamCount}</span><span class="stat-label">Team Tools</span></div>
    <div class="stat"><span class="stat-value">${sharedCount}</span><span class="stat-label">Shared</span></div>
    <div class="stat"><span class="stat-value">${autoCount}</span><span class="stat-label">Auto-discovered</span></div>
    <div class="stat"><span class="stat-value">${favs.size}</span><span class="stat-label">Favourites</span></div>`;
}

function isTeamTool(t) { return !!t.team_tag || TEAM_EMAILS.includes((t.created_by_email||"").toLowerCase()); }

function getFiltered() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const catF = document.getElementById("catFilter").value;
  const teamF = document.getElementById("teamFilter").value;
  const ownerF = document.getElementById("ownerFilter").value;
  return all.filter(t => {
    if (activePill==="favourites" && !favs.has(t.id)) return false;
    if (activePill && activePill!=="favourites" && t.tool_cat!==activePill) return false;
    if (catF && t.tool_cat!==catF) return false;
    if (teamF && t.team_tag!==teamF) return false;
    if (ownerF && t.created_by!==ownerF) return false;
    if (q) {
      const h = [t.name,t.description,t.created_by,t.url,t.tool_cat||"",TEAMS[t.team_tag]||""].join(" ").toLowerCase();
      if (!h.includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const team = sortItems(filtered.filter(t=>t.team_tag));
  const shared = sortItems(filtered.filter(t=>!t.team_tag));
  const el = document.getElementById("content");
  if (!filtered.length) { el.innerHTML='<div class="empty-state"><div style="font-size:36px">🔍</div><p>No sites match your filters.</p></div>'; return; }
  let html = "";
  if (team.length) html += renderSection("🔬 Delivery Predictions","team",team);
  if (shared.length) html += renderSection("🌐 Shared Tools","shared",shared);
  el.innerHTML = html;
}

function renderSection(title,type,items) {
  const isCol = collapsed[type];
  const { pg, pgHtml } = paginate(type, items);
  return `<div class="section">
    <div class="section-header" onclick="toggleCollapse('${type}')">
      <span class="chevron ${isCol?"collapsed":""}">▼</span>
      <h2>${title}</h2>
      <span class="section-count">${items.length} site${items.length!==1?"s":""}</span>
    </div>
    <div class="section-body ${isCol?"hidden":""}">
      <div class="card-grid">${pg.map(renderCard).join("")}</div>
      ${pgHtml}
    </div>
  </div>`;
}

function paginate(type, items) {
  const total = Math.ceil(items.length/PER_PAGE)||1;
  if (pages[type]>total) pages[type]=1;
  const p = pages[type];
  const start = (p-1)*PER_PAGE;
  const pg = items.slice(start, start+PER_PAGE);
  let pgHtml = "";
  if (items.length > PER_PAGE) {
    const btns = [];
    for (let i=1;i<=total;i++) btns.push(`<button class="pg-btn ${i===p?"active-pg":""}" onclick="setPage('${type}',${i})">${i}</button>`);
    pgHtml = `<div class="pagination">
      <button class="pg-btn" onclick="setPage('${type}',${p-1})" ${p<=1?"disabled":""}">← Prev</button>
      ${btns.join("")}
      <button class="pg-btn" onclick="setPage('${type}',${p+1})" ${p>=total?"disabled":""}>Next →</button>
      <span class="pg-info">${start+1}–${Math.min(start+PER_PAGE,items.length)} of ${items.length}</span>
    </div>`;
  }
  return { pg, pgHtml };
}

function renderCard(t) {
  const cat = CAT[t.tool_cat];
  const catBadge = cat ? `<span class="badge cat-${t.tool_cat}">${cat.icon} ${cat.label}</span>` : "";
  const teamBadge = TEAMS[t.team_tag] ? `<span class="badge team-badge">${TEAMS[t.team_tag]}</span>` : "";
  const srcBadge = t.source==="auto" ? `<span class="badge source-auto">auto</span>` : "";
  const gh = t.github ? `<a href="${t.github}" target="_blank">📂 Repo</a>` : "";
  const isFav = favs.has(t.id);
  const canManage = currentUser && (t.created_by===currentUser.fullName || t.created_by===currentUser.email || isAdmin());
  const actions = canManage ? `<div class="card-actions"><button class="action-btn" onclick="editTool('${t.id}')" title="Edit">✏️</button><button class="action-btn del" onclick="deleteTool('${t.id}')" title="Delete">🗑</button></div>` : "";
  return `<div class="card ${isFav?"is-favourited":""}">
    <div class="card-top">
      <div class="card-title">
        <button class="fav-btn ${isFav?"is-fav":""}" onclick="toggleFav('${t.id}')" title="${isFav?"Remove":"Add"} favourite">⭐</button>
        <a href="${t.url}" target="_blank">${t.name}</a>
      </div>
      ${actions}
    </div>
    <div class="card-desc">${t.description||"No description"}</div>
    <div class="card-footer">
      ${catBadge}${teamBadge}${srcBadge}
      <span style="margin-left:auto">👤 ${t.created_by}</span>
      ${gh}
    </div>
  </div>`;
}

// Modal
function openModal() {
  document.getElementById("toolForm").reset();
  document.getElementById("editId").value="";
  document.getElementById("modalTitle").textContent="Add a Tool";
  document.getElementById("submitBtn").textContent="Add";
  if (currentUser) document.getElementById("fOwner").value=currentUser.fullName||"";
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal(e) { if(e&&e.target!==e.currentTarget)return; document.getElementById("modalOverlay").classList.remove("open"); }

async function editTool(id) {
  const t=all.find(x=>x.id===id); if(!t)return;
  document.getElementById("editId").value=id;
  document.getElementById("fName").value=t.name;
  document.getElementById("fUrl").value=t.url;
  document.getElementById("fDesc").value=t.description;
  document.getElementById("fGithub").value=t.github||"";
  document.getElementById("fCat").value=t.tool_cat||"development";
  document.getElementById("fTeam").value=t.team_tag||"";
  document.getElementById("fOwner").value=t.created_by;
  document.getElementById("modalTitle").textContent="Edit Tool";
  document.getElementById("submitBtn").textContent="Save";
  document.getElementById("modalOverlay").classList.add("open");
}

async function deleteTool(id) { const t=all.find(x=>x.id===id); if(!t||!confirm(`Delete "${t.name}"?`))return; await db.delete(id); await loadTools(); }

async function saveTool(e) {
  e.preventDefault();
  const data = {
    name:document.getElementById("fName").value.trim(),
    url:document.getElementById("fUrl").value.trim(),
    description:document.getElementById("fDesc").value.trim(),
    github:document.getElementById("fGithub").value.trim(),
    tool_cat:document.getElementById("fCat").value,
    team_tag:document.getElementById("fTeam").value,
    created_by:document.getElementById("fOwner").value.trim(),
    source:"manual"
  };
  const editId=document.getElementById("editId").value;
  const dup=all.find(t=>t.url===data.url&&t.id!==editId);
  if(dup&&!editId){alert(`Already exists: "${dup.name}"`);return;}
  if(editId) await db.update(editId,data); else await db.create(data);
  closeModal(); await loadTools();
}

function setupListeners() {
  const reset = ()=>{ pages.team=1; pages.shared=1; render(); };
  document.getElementById("searchInput").addEventListener("input",reset);
  document.getElementById("catFilter").addEventListener("change",reset);
  document.getElementById("teamFilter").addEventListener("change",reset);
  document.getElementById("ownerFilter").addEventListener("change",reset);
  document.getElementById("sortSelect").addEventListener("change",e=>{ sort=e.target.value; render(); });
  db.subscribe({ onCreate:()=>loadTools(), onUpdate:()=>loadTools(), onDelete:()=>loadTools() });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape")closeModal(); });
}

init();
</script>
